<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherScope — Investigation Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --ink:#0d1117;
    --panel:#141b22;
    --panel-2:#1a232c;
    --line:#263340;
    --text:#dce4ec;
    --text-dim:#7d8b99;
    --amber:#e0a63c;
    --amber-dim:#8a6a2c;
    --forensic-blue:#3d8bfd;
    --ok:#4caf7d;
    --warn:#d9714e;
    --radius:3px;
    --mono:'JetBrains Mono', monospace;
    --sans:'Space Grotesk', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--ink); color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
  }
  ::selection{ background:var(--amber-dim); }

  /* ---- Top bar ---- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #10161c, #0d1117);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .mark{
    width:26px; height:26px; border:1.5px solid var(--amber);
    border-radius:50%; position:relative; flex-shrink:0;
  }
  .brand .mark::after{
    content:''; position:absolute; inset:6px; border:1.5px solid var(--amber);
    border-radius:50%; opacity:.5;
  }
  .brand-text{ font-weight:700; letter-spacing:.04em; font-size:16px; }
  .brand-text small{ display:block; font-weight:400; color:var(--text-dim); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; margin-top:1px;}
  .user-chip{ font-family:var(--mono); font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:12px; }
  .user-chip button{
    background:none; border:1px solid var(--line); color:var(--text-dim);
    padding:5px 12px; border-radius:var(--radius); cursor:pointer; font-family:var(--sans); font-size:12px;
  }
  .user-chip button:hover{ border-color:var(--warn); color:var(--warn); }

  /* ---- Layout ---- */
  .shell{ max-width:1160px; margin:0 auto; padding:32px 28px 80px; }
  .hidden{ display:none !important; }

  /* ---- Auth screen ---- */
  .auth-wrap{
    min-height:calc(100vh - 60px); display:flex; align-items:center; justify-content:center;
  }
  .auth-card{
    width:400px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:32px; position:relative;
  }
  .auth-card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--amber), transparent 70%);
  }
  .auth-title{ font-size:20px; font-weight:700; margin:0 0 4px; }
  .auth-sub{ color:var(--text-dim); font-size:13px; margin:0 0 24px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin-bottom:6px; }
  .field input{
    width:100%; background:var(--ink); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:var(--radius); font-family:var(--sans); font-size:14px;
  }
  .field input:focus{ outline:none; border-color:var(--forensic-blue); }
  .btn{
    background:var(--amber); color:#1a1305; border:none; padding:11px 16px;
    font-weight:600; border-radius:var(--radius); cursor:pointer; font-size:13px;
    width:100%; letter-spacing:.02em;
  }
  .btn:hover{ background:#f0b654; }
  .btn.secondary{ background:none; border:1px solid var(--line); color:var(--text); }
  .btn.secondary:hover{ border-color:var(--forensic-blue); color:var(--forensic-blue); }
  .btn.small{ width:auto; padding:8px 14px; font-size:12px; }
  .auth-toggle{ text-align:center; margin-top:16px; font-size:12.5px; color:var(--text-dim); }
  .auth-toggle a{ color:var(--forensic-blue); cursor:pointer; text-decoration:none; }
  .err-msg{
    background:rgba(217,113,78,.12); border:1px solid var(--warn); color:#f0b39a;
    padding:9px 12px; border-radius:var(--radius); font-size:12.5px; margin-bottom:14px;
  }

  /* ---- Case list ---- */
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; }
  .section-head h2{ font-size:15px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); font-weight:600; margin:0;}
  .case-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:14px; }
  .case-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; cursor:pointer; transition:border-color .15s;
  }
  .case-card:hover{ border-color:var(--forensic-blue); }
  .case-num{ font-family:var(--mono); font-size:11px; color:var(--amber); letter-spacing:.05em; }
  .case-title{ font-size:15px; font-weight:600; margin:6px 0 8px; }
  .case-desc{ font-size:12.5px; color:var(--text-dim); line-height:1.5; margin:0 0 14px; min-height:32px; }
  .case-meta{ display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); border-top:1px solid var(--line); padding-top:10px; }
  .badge{ background:var(--panel-2); border:1px solid var(--line); padding:2px 8px; border-radius:20px; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;}

  /* ---- Case detail ---- */
  .back-link{ color:var(--text-dim); font-size:12.5px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; margin-bottom:18px;}
  .back-link:hover{ color:var(--forensic-blue); }
  .case-header{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:26px; flex-wrap:wrap; gap:16px;}
  .case-header h1{ font-size:22px; margin:0 0 6px; }
  .case-header .case-num{ font-size:12px; }
  .case-header p{ color:var(--text-dim); font-size:13px; max-width:560px; margin:8px 0 0; }

  .upload-zone{
    border:1.5px dashed var(--line); border-radius:var(--radius); padding:26px;
    text-align:center; margin-bottom:26px; transition:border-color .15s, background .15s;
    cursor:pointer;
  }
  .upload-zone.drag{ border-color:var(--amber); background:rgba(224,166,60,.05); }
  .upload-zone p{ margin:0; color:var(--text-dim); font-size:13px; }
  .upload-zone strong{ color:var(--text); }
  .upload-zone input{ display:none; }

  table.evidence-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.evidence-table th{
    text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--text-dim); border-bottom:1px solid var(--line); padding:0 10px 10px;
    font-weight:600;
  }
  table.evidence-table td{ padding:12px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  table.evidence-table tr:last-child td{ border-bottom:none; }
  .fname{ font-weight:600; word-break:break-all; }
  .hash{ font-family:var(--mono); font-size:10.5px; color:var(--text-dim); word-break:break-all; }
  .status-pill{ font-size:10.5px; padding:2px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.05em; display:inline-block;}
  .status-processed{ background:rgba(76,175,125,.15); color:var(--ok); border:1px solid var(--ok);}
  .status-processing,.status-uploaded{ background:rgba(61,139,253,.15); color:var(--forensic-blue); border:1px solid var(--forensic-blue);}
  .status-failed{ background:rgba(217,113,78,.15); color:var(--warn); border:1px solid var(--warn);}
  .extract-preview{ color:var(--text-dim); font-size:12px; max-width:340px; line-height:1.5;}
  .dup-flag{ color:var(--warn); font-size:11px; font-family:var(--mono); }
  .empty-state{ text-align:center; padding:50px 20px; color:var(--text-dim); }
  .empty-state h3{ color:var(--text); font-weight:600; margin-bottom:6px; }

  .modal-bg{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:50;
  }
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:26px; width:400px;
  }
  .modal h3{ margin:0 0 18px; font-size:16px;}
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--panel); border:1px solid var(--line);
    border-left:3px solid var(--ok); padding:12px 18px; border-radius:var(--radius); font-size:13px; z-index:60;
  }
  .toast.error{ border-left-color:var(--warn); }
  .spin{
    width:14px;height:14px;border:2px solid var(--text-dim); border-top-color:var(--amber);
    border-radius:50%; display:inline-block; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:6px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark"></div>
    <div class="brand-text">CIPHERSCOPE<small>Investigation Intelligence Platform</small></div>
  </div>
  <div class="user-chip" id="userChip"></div>
</div>

<div id="app"></div>

<script>
const API = 'http://localhost:8000';
let state = {
  token: null,
  user: null,
  view: 'login', // login | register | cases | case-detail
  cases: [],
  currentCase: null,
  evidence: [],
};

// ---------- API helpers (real network calls, no mocking) ----------
async function api(path, opts = {}) {
  const headers = opts.headers || {};
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  if (opts.body && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (!res.ok) {
    let detail = 'Request failed';
    try { detail = (await res.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  if (res.status === 204) return null;
  return res.json();
}

function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ---------- Render ----------
function render() {
  const app = document.getElementById('app');
  const chip = document.getElementById('userChip');
  chip.innerHTML = state.user
    ? `${state.user.full_name} · ${state.user.role} <button onclick="logout()">Sign out</button>`
    : '';

  if (state.view === 'login') app.innerHTML = renderLogin();
  else if (state.view === 'register') app.innerHTML = renderRegister();
  else if (state.view === 'cases') { app.innerHTML = renderCaseList(); }
  else if (state.view === 'case-detail') { app.innerHTML = renderCaseDetail(); }

  wireEvents();
}

function renderLogin() {
  return `
  <div class="auth-wrap">
    <div class="auth-card">
      <p class="auth-title">Investigator sign in</p>
      <p class="auth-sub">Access your organization's case files.</p>
      ${state.authError ? `<div class="err-msg">${state.authError}</div>` : ''}
      <form id="loginForm">
        <div class="field"><label>Email</label><input type="email" name="email" required autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" name="password" required autocomplete="current-password"></div>
        <button class="btn" type="submit">Sign in</button>
      </form>
      <p class="auth-toggle">No organization yet? <a onclick="switchView('register')">Register one</a></p>
    </div>
  </div>`;
}

function renderRegister() {
  return `
  <div class="auth-wrap">
    <div class="auth-card">
      <p class="auth-title">Register organization</p>
      <p class="auth-sub">Creates your org and your first admin investigator account.</p>
      ${state.authError ? `<div class="err-msg">${state.authError}</div>` : ''}
      <form id="registerForm">
        <div class="field"><label>Organization name</label><input name="organization_name" required></div>
        <div class="field"><label>Your full name</label><input name="full_name" required></div>
        <div class="field"><label>Email</label><input type="email" name="email" required></div>
        <div class="field"><label>Password (min 8 chars)</label><input type="password" name="password" minlength="8" required></div>
        <button class="btn" type="submit">Create organization</button>
      </form>
      <p class="auth-toggle">Already registered? <a onclick="switchView('login')">Sign in</a></p>
    </div>
  </div>`;
}

function renderCaseList() {
  const cards = state.cases.map(c => `
    <div class="case-card" onclick="openCase('${c.id}')">
      <div class="case-num">${c.case_number}</div>
      <div class="case-title">${escapeHtml(c.title)}</div>
      <p class="case-desc">${escapeHtml(c.description || 'No description provided.')}</p>
      <div class="case-meta">
        <span class="badge">${c.status}</span>
        <span>${c.evidence_count} item${c.evidence_count === 1 ? '' : 's'}</span>
      </div>
    </div>`).join('');

  return `
  <div class="shell">
    <div class="section-head">
      <h2>Active Investigations</h2>
      <button class="btn small" onclick="openNewCaseModal()">+ New Case</button>
    </div>
    ${state.cases.length ? `<div class="case-grid">${cards}</div>` : `
      <div class="empty-state">
        <h3>No cases yet</h3>
        <p>Create your first investigation to start uploading evidence.</p>
      </div>`}
  </div>
  ${state.showNewCaseModal ? renderNewCaseModal() : ''}
  `;
}

function renderNewCaseModal() {
  return `
  <div class="modal-bg" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <h3>New Investigation</h3>
      <form id="newCaseForm">
        <div class="field"><label>Title</label><input name="title" required autofocus></div>
        <div class="field"><label>Description</label><input name="description"></div>
        <div class="modal-actions">
          <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn">Create case</button>
        </div>
      </form>
    </div>
  </div>`;
}

function renderCaseDetail() {
  const c = state.currentCase;
  const rows = state.evidence.map(e => `
    <tr>
      <td>
        <div class="fname">${escapeHtml(e.original_filename)}</div>
        <div class="hash">SHA256 ${e.sha256_hash}</div>
        <div class="hash">MD5 &nbsp;&nbsp;${e.md5_hash}</div>
        ${e.is_duplicate_of ? `<div class="dup-flag">⚠ duplicate of evidence ${e.is_duplicate_of.slice(0,8)}…</div>` : ''}
      </td>
      <td>${(e.file_size_bytes/1024).toFixed(1)} KB<br><span class="hash">${e.mime_type || e.file_extension || '—'}</span></td>
      <td><span class="status-pill status-${e.status}">${e.status}</span>
        ${e.extraction_confidence != null ? `<div class="hash" style="margin-top:5px;">OCR confidence: ${e.extraction_confidence}%</div>` : ''}
      </td>
      <td class="extract-preview">
        ${e.extracted_text ? escapeHtml(e.extracted_text.slice(0, 220)) + (e.extracted_text.length > 220 ? '…' : '') : (e.processing_error ? `<span style="color:var(--warn)">${escapeHtml(e.processing_error)}</span>` : '<em>No extractable text</em>')}
        <div class="hash" style="margin-top:6px;">${e.extraction_method || ''}</div>
      </td>
    </tr>`).join('');

  return `
  <div class="shell">
    <div class="back-link" onclick="backToCases()">← All investigations</div>
    <div class="case-header">
      <div>
        <div class="case-num">${c.case_number}</div>
        <h1>${escapeHtml(c.title)}</h1>
        <p>${escapeHtml(c.description || '')}</p>
      </div>
    </div>

    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" multiple>
      <p><strong>Click to upload evidence</strong> or drag files here</p>
      <p style="margin-top:4px; font-size:11px;">Images run through OCR · PDFs & text files extract their text layer · SHA256 &amp; MD5 computed on every file</p>
    </div>

    ${state.evidence.length ? `
    <table class="evidence-table">
      <thead><tr><th>Evidence &amp; Hashes</th><th>Size / Type</th><th>Status</th><th>Extracted Content</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` : `
    <div class="empty-state">
      <h3>No evidence uploaded</h3>
      <p>Upload a file above to run hashing and text extraction.</p>
    </div>`}
  </div>`;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ---------- Actions ----------
async function switchView(v) {
  state.authError = null;
  state.view = v;
  render();
}

async function logout() {
  state = { token: null, user: null, view: 'login', cases: [], currentCase: null, evidence: [] };
  render();
}

async function openCase(id) {
  try {
    state.currentCase = await api(`/cases/${id}`);
    state.evidence = await api(`/cases/${id}/evidence`);
    state.view = 'case-detail';
    render();
  } catch (e) { showToast(e.message, true); }
}

function backToCases() {
  state.view = 'cases';
  state.currentCase = null;
  render();
}

function openNewCaseModal() { state.showNewCaseModal = true; render(); }
function closeModal() { state.showNewCaseModal = false; render(); }

async function refreshEvidence() {
  state.evidence = await api(`/cases/${state.currentCase.id}/evidence`);
  render();
}

async function uploadFiles(files) {
  for (const file of files) {
    showToast(`Uploading & processing ${file.name}…`);
    const fd = new FormData();
    fd.append('file', file);
    try {
      await api(`/cases/${state.currentCase.id}/evidence`, { method: 'POST', body: fd });
      showToast(`${file.name} processed.`);
    } catch (e) {
      showToast(`${file.name}: ${e.message}`, true);
    }
  }
  await refreshEvidence();
}

// ---------- Event wiring ----------
function wireEvents() {
  const loginForm = document.getElementById('loginForm');
  if (loginForm) loginForm.onsubmit = async (ev) => {
    ev.preventDefault();
    const fd = new FormData(loginForm);
    try {
      const { access_token } = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
      });
      state.token = access_token;
      state.user = await api('/auth/me');
      state.cases = await api('/cases');
      state.view = 'cases';
      state.authError = null;
      render();
    } catch (e) { state.authError = e.message; render(); }
  };

  const registerForm = document.getElementById('registerForm');
  if (registerForm) registerForm.onsubmit = async (ev) => {
    ev.preventDefault();
    const fd = new FormData(registerForm);
    try {
      const { access_token } = await api('/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          organization_name: fd.get('organization_name'),
          full_name: fd.get('full_name'),
          email: fd.get('email'),
          password: fd.get('password'),
        }),
      });
      state.token = access_token;
      state.user = await api('/auth/me');
      state.cases = await api('/cases');
      state.view = 'cases';
      state.authError = null;
      render();
    } catch (e) { state.authError = e.message; render(); }
  };

  const newCaseForm = document.getElementById('newCaseForm');
  if (newCaseForm) newCaseForm.onsubmit = async (ev) => {
    ev.preventDefault();
    const fd = new FormData(newCaseForm);
    try {
      await api('/cases', {
        method: 'POST',
        body: JSON.stringify({ title: fd.get('title'), description: fd.get('description') || null }),
      });
      state.showNewCaseModal = false;
      state.cases = await api('/cases');
      render();
    } catch (e) { showToast(e.message, true); }
  };

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  if (dropZone) {
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = () => uploadFiles(fileInput.files);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag');
    dropZone.ondrop = (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag');
      uploadFiles(e.dataTransfer.files);
    };
  }
}

render();
</script>
</body>
</html>
